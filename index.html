<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📺 TV Monde - By KML</title>

    <!-- Ton unique CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- AdSense -->
    <script async 
        src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXX"
        crossorigin="anonymous">
    </script>
</head>

<body>

    <header>
        <h1>📺 TV Monde</h1>
        <p>Regardez les chaînes TV du monde entier gratuitement.</p>
    </header>

    <p><strong>Vos chaînes TV selon les pays</strong></p>

    <main>
        <!-- Liste des pays -->
        <aside id="countries"></aside>
        
        <!-- Liste des chaînes -->
        <section id="channels"></section>
        <div id="tv-player-container">
            <iframe id="tv-player" src="" allowfullscreen></iframe>
         </div>

        <!-- Lecteur vidéo -->
        <section id="player">
            <div id="video-container">
                <p>Sélectionnez une chaîne pour commencer.</p>
            </div>

            <!-- Pub sous le lecteur -->
            <div class="ads">
                <ins class="adsbygoogle"
                    style="display:block"
                    data-ad-client="ca-pub-XXXX"
                    data-ad-slot="1234567890"
                    data-ad-format="auto"
                    data-full-width-responsive="true">
                </ins>
                <script>
                    (adsbygoogle = window.adsbygoogle || []).push({});
                </script>
            </div>
        </section>
    </main>

    <script src="tv.js"></script>
</body>
</html>
