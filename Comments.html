    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commentaires</title>

    <style>
            body {
                background: #d7eaff;
                margin: 0;
                font-family: "Poppins", sans-serif;
                padding: 40px 20px;
                color: #333;
            }


        .container {
            max-width: 700px;
            margin: auto;
            background:#ffffffcc; 
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            animation: fade 0.6s ease;
        }

        @keyframes fade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: center;
            color: #8a4fff;
        }

        textarea {
            width: 100%;
            height: 120px;
            border-radius: 12px;
            border: 2px solid #ccc;
            padding: 12px;
            font-size: 1em;
            resize: none;
        }

        button {
            margin-top: 15px;
            padding: 12px 20px;
            background: #8a4fff;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1em;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #6f2fff;
        }

        .comment {
            background: #f7f7f7;
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
            border-left: 5px solid #8a4fff;
        }

        a.back {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 20px;
            background: #8a4fff;
            color: white;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
        }

        a.back:hover {
            background: #6f2fff;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Commentaires 💬</h1>

        <textarea id="commentInput" placeholder="Écrivez votre message ici..."></textarea>
        <button onclick="addComment()">Envoyer</button>

        <div id="commentsList"></div>

        <a href="index.html" class="back">⬅ Retour</a>
    </div>

    <script>
        function loadComments() {
            const comments = JSON.parse(localStorage.getItem("comments") || "[]");
            const list = document.getElementById("commentsList");
            list.innerHTML = "";

            comments.forEach(c => {
                const div = document.createElement("div");
                div.className = "comment";
                div.textContent = c;
                list.appendChild(div);
            });
        }

        function addComment() {
            const input = document.getElementById("commentInput");
            const text = input.value.trim();
            if (!text) return;

            const comments = JSON.parse(localStorage.getItem("comments") || "[]");
            comments.push(text);
            localStorage.setItem("comments", JSON.stringify(comments));

            input.value = "";
            loadComments();
        }

        loadComments();


    </script>

</body>
</html>
