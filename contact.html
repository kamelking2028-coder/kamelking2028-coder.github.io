<!DOCTYPE html>
<html lang="fr">
<head>
     <script src="https://5gvci.com/act/files/tag.min.js?z=11327421" data-cfasync="false" async></script>
   
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact – Radios Monde By‑KML</title>

    <style>
         body {
             background: #d7eaff;
             font-family: Arial, sans-serif;
             padding: 20px;
             color: #333;
         }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .contact-box {
            max-width: 450px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #0078ff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #005fcc;
        }
    </style>
</head>

<body>

    <h1>Contact</h1>

    <div class="contact-box">
        <form action="https://formsubmit.co/skanes2003@hotmail.com" method="POST">

            <!-- Anti-spam -->
            <input type="hidden" name="_captcha" value="false">

            <!-- Redirection après envoi -->
            <!--<input type="hidden" name="_next" value="https://kamelking2028-coder.github.io/radio-map/merci.html">-->
            <input type="hidden" name="_next" value="https://kamelking2028-coder.github.io/merci.html">
            <label>Votre nom :</label>
            <input type="text" name="nom" required>

            <label>Votre email :</label>
            <input type="email" name="email" required>

            <label>Votre message :</label>
            <textarea name="message" required></textarea>

            <button type="submit">Envoyer</button>
        </form>
    </div>

</body>
</html>
